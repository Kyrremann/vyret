name: Update weather

on:
  schedule:
    - cron: '0, 4,10,14,18 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'weather.rb'
      - '_data/places.yaml'

env:
  TZ: "Europe/Oslo"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      - name: Set up Ruby
        uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # ratchet:ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Run updated
        run: bundle exec ruby weather.rb
      - name: Save weather forecast
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "ci: Retrieved the latest forecasts"
          git push
