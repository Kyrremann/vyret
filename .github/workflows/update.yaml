name: Update weather

on:
  schedule:
    - cron: '0, 4,10,14,18 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'weather.rb'
      - '_data/places.yaml'

env:
  TZ: "Europe/Oslo"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3
      - name: Set up Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # ratchet:ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Run updated
        run: bundle exec ruby weather.rb
      - name: Save weather forecast
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "ci: Retrieved the latest forecasts"
          git push
